<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
:root{
  --cream:#F7F3EC; --olive:#6F7446; --yellow:#F1D56D; --oxblood:#742733; --clay:#DF906D; --ink:#2B2118;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{font-family: Georgia, serif; background:var(--cream); color:var(--ink); padding:60px 6vw;}
.label-tag{display:inline-block; background:var(--yellow); padding:6px 18px; font-weight:700; margin-bottom:14px; font-family:Arial, sans-serif; font-size:0.95rem;}
.section-rule{width:80px; height:3px; background:var(--oxblood); margin-bottom:40px;}
.hours-card{background:#fff; border-radius:16px; padding:36px 40px; box-shadow:0 15px 35px rgba(0,0,0,0.06); max-width:500px;}
</style>
</head>
<body>

<span class="label-tag">Hours</span>
<div class="section-rule"></div>

<div class="hours-card" style="display:flex; align-items:center; gap:26px; max-width:500px;">
  <div style="width:72px; height:72px; border-radius:50%; background:var(--oxblood); display:flex; align-items:center; justify-content:center; flex-shrink:0;">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7 V12 L15.5 14"/></svg>
  </div>
  <div>
    <div style="font-family:Arial, sans-serif; font-size:0.75rem; text-transform:uppercase; letter-spacing:2px; opacity:0.6; margin-bottom:6px;">Open Every Day</div>
    <div style="font-size:1.9rem; font-weight:700; font-family:Arial, sans-serif; color:var(--oxblood); line-height:1.1;">7:30 AM – 3:00 PM</div>
  </div>
</div>

<p style="margin-top:20px; opacity:0.7; max-width:500px;">Open every day of the week once we launch. Hours may shift slightly as we settle in — check back for updates.</p>

</body>
</html>
